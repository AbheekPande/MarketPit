<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Market Pit | Verify Email</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary": "#bcc7de",
              "outline-variant": "#3c4a42",
              "on-secondary": "#263143",
              "on-primary": "#003824",
              "surface-container": "#1b1f2b",
              "outline": "#86948a",
              "on-secondary-fixed": "#111c2d",
              "on-error-container": "#ffdad6",
              "on-background": "#dfe2f3",
              "primary": "#4edea3",
              "on-tertiary-fixed": "#002114",
              "tertiary": "#45dfa4",
              "surface-container-high": "#262a36",
              "primary-fixed-dim": "#4edea3",
              "surface-container-highest": "#303441",
              "surface": "#0f131f",
              "on-tertiary": "#003825",
              "inverse-surface": "#dfe2f3",
              "on-primary-container": "#00422b",
              "error-container": "#93000a",
              "on-primary-fixed": "#002113",
              "secondary-container": "#3e495d",
              "inverse-on-surface": "#2c303d",
              "tertiary-container": "#00b982",
              "on-error": "#690005",
              "on-surface": "#dfe2f3",
              "surface-container-lowest": "#0a0e19",
              "tertiary-fixed-dim": "#45dfa4",
              "secondary-fixed-dim": "#bcc7de",
              "secondary-fixed": "#d8e3fb",
              "surface-bright": "#353946",
              "error": "#ffb4ab",
              "on-secondary-fixed-variant": "#3c475a",
              "primary-fixed": "#6ffbbe",
              "surface-variant": "#303441",
              "inverse-primary": "#006c49",
              "on-surface-variant": "#bbcabf",
              "on-tertiary-container": "#00422c",
              "surface-container-low": "#171b27",
              "primary-container": "#10b981",
              "tertiary-fixed": "#68fcbf",
              "background": "#0f131f",
              "surface-tint": "#4edea3",
              "on-primary-fixed-variant": "#005236",
              "surface-dim": "#0f131f",
              "on-secondary-container": "#aeb9d0",
              "on-tertiary-fixed-variant": "#005137"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .glass-panel {
        background: rgba(23, 27, 39, 0.6);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
      }
      .input-glow:focus {
        box-shadow: inset 0 0 10px rgba(78, 222, 163, 0.1), 0 0 15px rgba(16, 185, 129, 0.2);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="bg-[#040712] text-on-surface font-body min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-[#040712] text-[#10B981] tracking-wider border-b-[0.5px] border-[#3c4a42]/20 flex justify-between items-center w-full px-6 py-4">
  <a href="index.html" class="text-lg font-bold tracking-tighter text-[#dfe2f3] uppercase hover:opacity-80 transition-opacity">
    MARKET PIT
  </a>
  <div class="flex items-center gap-6">
    <button class="text-[#bbcabf] hover:bg-[#171b27] hover:text-[#4edea3] transition-colors duration-200 p-2 rounded-full">
      <span class="material-symbols-outlined">help_outline</span>
    </button>
    <button class="text-[#bbcabf] hover:bg-[#171b27] hover:text-[#4edea3] transition-colors duration-200 p-2 rounded-full">
      <span class="material-symbols-outlined">settings</span>
    </button>
  </div>
</header>

<!-- Main -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
  <section class="glass-panel w-full max-w-lg border-[0.5px] border-outline-variant/30 rounded-[2rem] p-8 md:p-12 shadow-2xl relative z-10">

    <!-- Header -->
    <div class="space-y-2 mb-10">
      <div class="flex items-center gap-3 mb-4">
        <div class="h-[1px] w-8 bg-primary"></div>
        <span class="font-label text-primary text-[10px] uppercase tracking-[0.2em] font-bold">Security Protocol</span>
      </div>
      <h1 class="font-headline text-3xl md:text-4xl font-extrabold tracking-tight text-on-surface">
        Verify your email
      </h1>
      <p class="font-body text-on-surface-variant text-sm leading-relaxed max-w-sm" id="verify-subtitle">
        A 6-digit verification code was sent to your email. Enter it below to continue.
      </p>
    </div>

    <!-- OTP Form → submits to dashboard.html -->
    <form class="space-y-10" onsubmit="window.location.href='dashboard.html'; return false;">
      <div class="flex justify-between gap-2 md:gap-4" id="otp-inputs">
        <input class="w-full h-16 md:h-20 bg-surface-container-lowest border-[0.5px] border-outline-variant/40 rounded-xl text-center font-headline text-2xl font-bold text-primary focus:border-primary focus:ring-0 outline-none transition-all input-glow" maxlength="1" placeholder="·" type="text"/>
        <input class="w-full h-16 md:h-20 bg-surface-container-lowest border-[0.5px] border-outline-variant/40 rounded-xl text-center font-headline text-2xl font-bold text-primary focus:border-primary focus:ring-0 outline-none transition-all input-glow" maxlength="1" placeholder="·" type="text"/>
        <input class="w-full h-16 md:h-20 bg-surface-container-lowest border-[0.5px] border-outline-variant/40 rounded-xl text-center font-headline text-2xl font-bold text-primary focus:border-primary focus:ring-0 outline-none transition-all input-glow" maxlength="1" placeholder="·" type="text"/>
        <input class="w-full h-16 md:h-20 bg-surface-container-lowest border-[0.5px] border-outline-variant/40 rounded-xl text-center font-headline text-2xl font-bold text-primary focus:border-primary focus:ring-0 outline-none transition-all input-glow" maxlength="1" placeholder="·" type="text"/>
        <input class="w-full h-16 md:h-20 bg-surface-container-lowest border-[0.5px] border-outline-variant/40 rounded-xl text-center font-headline text-2xl font-bold text-primary focus:border-primary focus:ring-0 outline-none transition-all input-glow" maxlength="1" placeholder="·" type="text"/>
        <input class="w-full h-16 md:h-20 bg-surface-container-lowest border-[0.5px] border-outline-variant/40 rounded-xl text-center font-headline text-2xl font-bold text-primary focus:border-primary focus:ring-0 outline-none transition-all input-glow" maxlength="1" placeholder="·" type="text"/>
      </div>

      <div class="space-y-6">
        <button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-sm tracking-wide rounded-xl shadow-[0_4px_20px_rgba(16,185,129,0.3)] hover:brightness-110 active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
          Verify Code
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
        <div class="flex flex-col items-center gap-4 pt-4">
          <p class="font-label text-[11px] text-on-surface-variant/60 uppercase tracking-widest">Didn't receive the code?</p>
          <button class="font-headline text-primary text-sm font-semibold hover:text-primary-fixed-dim transition-colors flex items-center gap-2 group" type="button" onclick="resendCode()">
            <span class="material-symbols-outlined text-lg group-hover:rotate-180 transition-transform duration-500">refresh</span>
            Resend code
          </button>
        </div>
      </div>
    </form>

    <!-- Status bar -->
    <div class="mt-12 pt-8 border-t-[0.5px] border-outline-variant/20 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
        </span>
        <span class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">System Live</span>
      </div>
      <div class="font-label text-[10px] text-on-surface-variant/40 uppercase tracking-widest">AES-256 Encrypted</div>
    </div>
  </section>
</main>

<!-- Footer -->
<footer class="fixed bottom-0 w-full bg-[#040712] border-t-[0.5px] border-[#3c4a42]/20 flex justify-between items-center px-8 py-3 backdrop-blur-md">
  <div class="text-[#bbcabf]/50 text-[10px] uppercase tracking-widest">© 2024 MARKET PIT. TERMINAL_VERIFIED.</div>
  <div class="flex gap-6">
    <a class="text-[#bbcabf]/50 hover:text-[#4edea3] transition-opacity text-[10px] uppercase tracking-widest" href="#">Security</a>
    <a class="text-[#bbcabf]/50 hover:text-[#4edea3] transition-opacity text-[10px] uppercase tracking-widest" href="#">Privacy</a>
    <a class="text-[#bbcabf]/50 hover:text-[#4edea3] transition-opacity text-[10px] uppercase tracking-widest" href="#">Terms</a>
  </div>
</footer>

<script>
  // ── Auto-advance between OTP inputs ────────────────────────────────────────
  const inputs = document.querySelectorAll('#otp-inputs input');
  inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      if (input.value.length === 1 && i < inputs.length - 1) {
        inputs[i + 1].focus();
      }
      // Auto-submit when all 6 filled
      const allFilled = [...inputs].every(inp => inp.value.length === 1);
      if (allFilled) {
        setTimeout(() => window.location.href = 'dashboard.html', 300);
      }
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) {
        inputs[i - 1].focus();
      }
    });
    // Only allow digits
    input.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key)) e.preventDefault();
    });
  });

  // ── Show email in subtitle if passed via URL param ─────────────────────────
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  if (email) {
    document.getElementById('verify-subtitle').textContent =
      `A 6-digit verification code was sent to ${email}. Enter it below to continue.`;
  }

  // ── Resend code feedback ───────────────────────────────────────────────────
  function resendCode() {
    const btn = event.currentTarget;
    btn.textContent = '✓ Code resent!';
    btn.style.color = '#4edea3';
    setTimeout(() => {
      btn.innerHTML = '<span class="material-symbols-outlined text-lg" style="transition:transform .5s">refresh</span> Resend code';
    }, 3000);
  }
</script>
</body></html>
